<!DOCTYPE html>
<html>

<head>
    <title>Companies</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div style="margin-bottom:20px;">
    <a href="/">Dashboard</a> |
    <a href="/companies">Companies</a> |
    <a href="/jobs">Jobs</a> |
    <a href="/contacts">Contacts</a> |
    <a href="/applications">Applications</a> |
    <a href="/job_match">Job Match</a>
</div>

<h1>Companies</h1>

<a href="/add_company">Add Company</a>

<br><br>

<div class="container">

<table border="1">
    <tr>
        <th>ID</th>
        <th>Company Name</th>
        <th>Location</th>
        <th>Actions</th>
    </tr>

    {% for company in companies %}
    <tr>
        <td>{{ company.company_id }}</td>
        <td>{{ company.company_name }}</td>
        <td>{{ company.location }}</td>
        <td>
            <a href="/edit_company/{{ company.company_id }}">Edit</a> |
            <a href="/delete_company/{{ company.company_id }}" onclick="return confirm('Are you sure you want to delete this company?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

<br>

<div style="margin-bottom: 20px;">
    <a href="/" style="background-color: #007BFF; color: white; padding: 8px 12px; border-radius: 5px; text-decoration: none;">
        🏠 Home
    </a>
</div>

</body>
</html>
