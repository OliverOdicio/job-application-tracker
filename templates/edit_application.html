<!DOCTYPE html>
<html>

<head>
    <title>Edit Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div style="margin-bottom:20px;">
    <a href="/">Dashboard</a> |
    <a href="/companies">Companies</a> |
    <a href="/jobs">Jobs</a> |
    <a href="/contacts">Contacts</a> |
    <a href="/applications">Applications</a> |
    <a href="/job_match">Job Match</a>
</div>

<h1>Edit Application</h1>

<form method="POST">

    <label>Job:</label>
    <select name="job_id" required>
        {% for job in jobs %}
            <option value="{{ job.job_id }}"
                {% if job.job_id == application.job_id %}selected{% endif %}>
                {{ job.job_title }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Status:</label>
    <input type="text" name="status" value="{{ application.status }}" required>

    <br><br>

    <label>Date:</label>
    <input type="date" name="application_date" value="{{ application.application_date }}">

    <br><br>

    <button type="submit">Update Application</button>
</form>

<br>

<a href="/applications">Back to Applications</a>

</body>
</html>
