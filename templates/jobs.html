<!DOCTYPE html>
<html>

<head>
    <title>Jobs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div style="margin-bottom:20px;">
    <a href="/">Dashboard</a> |
    <a href="/companies">Companies</a> |
    <a href="/jobs">Jobs</a> |
    <a href="/contacts">Contacts</a> |
    <a href="/applications">Applications</a> |
    <a href="/job_match">Job Match</a>
</div>

<h1>Jobs</h1>

<a href="/add_job">Add Job</a>

<br><br>

<div class="container">

<table>
    <tr>
        <th>ID</th>
        <th>Job Title</th>
        <th>Company</th>
        <th>Actions</th>
    </tr>

    {% for job in jobs %}
    <tr>
        <td>{{ job.job_id }}</td>
        <td>{{ job.job_title }}</td>
        <td>{{ job.company_name }}</td>
        <td>
            <a href="/edit_job/{{ job.job_id }}">Edit</a> |
            <a href="/delete_job/{{ job.job_id }}" onclick="return confirm('Are you sure you want to delete this job?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

<br>

<div style="margin-bottom: 20px;">
    <a href="/" style="background-color: #007BFF; color: white; padding: 8px 12px; border-radius: 5px; text-decoration: none;">
        🏠 Home
    </a>
</div>

</body>
</html>
