<!DOCTYPE html>
<html>

<head>
    <title>Contacts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div style="margin-bottom:20px;">
    <a href="/">Dashboard</a> |
    <a href="/companies">Companies</a> |
    <a href="/jobs">Jobs</a> |
    <a href="/contacts">Contacts</a> |
    <a href="/applications">Applications</a> |
    <a href="/job_match">Job Match</a>
</div>

<h1>Contacts</h1>

<a href="/add_contact">Add Contact</a>

<br><br>

<div class="container">

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Company</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for contact in contacts %}
    <tr>
        <td>{{ contact.contact_id }}</td>
        <td>{{ contact.contact_name }}</td>
        <td>{{ contact.company_name }}</td>
        <td>{{ contact.email }}</td>
        <td>
            <a href="/edit_contact/{{ contact.contact_id }}">Edit</a> |
            <a href="/delete_contact/{{ contact.contact_id }}" onclick="return confirm('Are you sure you want to delete this contact?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

<br>

<div style="margin-bottom: 20px;">
    <a href="/" style="background-color: #007BFF; color: white; padding: 8px 12px; border-radius: 5px; text-decoration: none;">
        🏠 Home
    </a>
</div>

</body>
</html>
